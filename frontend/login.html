<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mini AI LinkedIn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#0a66c2', primaryHover: '#004182', secondary: '#f3f2ef', textDark: '#191919', textMuted: '#666666' } } }
    }
  </script>
</head>
<body class="bg-secondary text-textDark font-sans relative flex flex-col min-h-screen items-center justify-center">
  
  <div class="mb-6 w-full max-w-sm">
    <a href="index.html" class="flex flex-col items-start w-fit">
      <div class="bg-primary text-white font-bold text-3xl rounded px-3 py-1 tracking-tight">in</div>
      <span class="text-sm text-primary font-bold mt-[-2px]">AI</span>
    </a>
  </div>

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm border border-gray-200">
    <h1 class="text-3xl font-semibold text-gray-800 mb-1">Sign in</h1>
    <p class="text-sm text-gray-500 mb-6">Stay updated on your professional world</p>
    
    <form id="login-form" class="space-y-4">
      <div>
        <input type="email" id="email" placeholder="Email" required class="w-full border border-gray-600 rounded px-3 py-2 text-textDark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary h-12">
      </div>
      <div>
        <input type="password" id="password" placeholder="Password" required class="w-full border border-gray-600 rounded px-3 py-2 text-textDark focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary h-12">
      </div>
      
      <a href="#" class="text-sm font-semibold text-primary hover:underline hover:bg-blue-50 py-1 px-2 rounded -ml-2">Forgot password?</a>
      
      <button type="submit" id="submit-btn" class="w-full bg-primary text-white rounded-full font-medium py-3 hover:bg-[#004182] transition duration-200 mt-2">
        Sign in
      </button>
      
      <div id="error-msg" class="text-red-600 text-sm text-center hidden mt-2"></div>
    </form>
  </div>
  
  <div class="mt-6 text-center text-sm w-full max-w-sm flex items-center justify-center gap-1">
    <p>New to Mini AI LinkedIn?</p>
    <a href="signup.html" class="text-primary font-semibold hover:bg-blue-50 py-1 px-2 rounded transition">Join now</a>
  </div>

  <script type="module" src="js/firebaseConfig.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
