<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile | Mini AI LinkedIn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#0a66c2', primaryHover: '#004182', secondary: '#f3f2ef', textDark: '#191919', textMuted: '#666666' } } } }
  </script>
</head>
<body class="bg-secondary text-textDark font-sans pt-20 pb-10 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm fixed w-full z-50 top-0 left-0 h-16 flex items-center px-4 md:px-8 border-b border-gray-200">
    <div class="max-w-6xl mx-auto w-full flex justify-between items-center">
      <div class="flex items-center gap-2">
        <a href="feed.html" class="flex flex-col items-center">
          <div class="bg-primary text-white font-bold text-xl rounded px-2 tracking-tight">in</div>
          <span class="text-xs text-primary font-bold mt-[-2px]">AI</span>
        </a>
      </div>
      <div class="flex items-center gap-6">
        <a href="feed.html" class="flex flex-col items-center text-gray-500 hover:text-textDark pb-1">
          <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23 9v2h-2v7a3 3 0 01-3 3h-4v-6h-4v6H6a3 3 0 01-3-3v-7H1V9l11-7z"></path></svg>
          <span class="text-xs hidden md:block">Home</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Edit Profile Body -->
  <main class="max-w-3xl mx-auto px-4">
    <section class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 space-y-6 relative">
      <h1 class="text-2xl font-semibold text-textDark border-b pb-4">Edit Intro</h1>

      <form id="edit-profile-form" class="space-y-4">
        <div>
          <label class="block text-sm text-gray-600 mb-1 font-medium">Full Name *</label>
          <input type="text" id="name" required class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary h-10">
        </div>
        
        <div>
          <label class="block text-sm text-gray-600 mb-1 font-medium">Profile Picture URL</label>
          <input type="text" id="profilePicture" class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary h-10" placeholder="https://example.com/photo.jpg">
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1 font-medium">Headline</label>
          <input type="text" id="headline" class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary h-10">
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1 font-medium">Location</label>
          <input type="text" id="location" class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary h-10">
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="block text-sm text-gray-600 font-medium">About (Bio)</label>
            <button type="button" id="enhance-bio-btn" class="flex items-center gap-1 text-purple-600 text-sm hover:underline font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
              AI Enhance
            </button>
          </div>
          <textarea id="bio" rows="4" class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary"></textarea>
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1 font-medium">Skills (comma separated)</label>
          <input type="text" id="skills" class="w-full border border-gray-400 rounded px-3 py-2 text-textDark focus:outline-none focus:ring-1 focus:ring-primary h-10" placeholder="JavaScript, React, Node.js">
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t">
          <a href="profile.html" class="px-5 py-1.5 rounded-full font-medium text-gray-600 hover:bg-gray-100 transition">Cancel</a>
          <button type="submit" id="save-btn" class="bg-primary text-white px-5 py-1.5 rounded-full font-medium hover:bg-primaryHover transition">Save</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="js/firebaseConfig.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/edit-profile.js"></script>
</body>
</html>
